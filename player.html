<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="player"></div>
</body>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    #player {
        width: 100%;
        height: 100%;
    }
</style>
</html>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const id = new URLSearchParams(window.location.search).get('id') ?? "dQw4w9WgXcQ"

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '390',
            width: '640',
            videoId: id,
        });
    }

    window.addEventListener("message", (event) => {
        if (event.data.type != "cmd"){return;}
        else{player[event.data.func](event.data.args)}
    });
</script>
